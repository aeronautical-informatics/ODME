name: ODME CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build source
        run: mvn -B package -Dmaven.test.skip=true --file pom.xml

      - name: Run SpotBugs
        run: mvn -B spotbugs:check --file pom.xml

      - name: Run Checkstyle
        run: mvn -B checkstyle:check --file pom.xml

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.repository == github.event.repository.full_name
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build fat JAR
        run: mvn -B package -Dmaven.test.skip=true --file pom.xml

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ODME-jar
          path: target/SESEditor-*.jar
          if-no-files-found: error
